name: demo

networks:
  app:
    driver: bridge

services:
  app:
    #image: registry.cn-hangzhou.aliyuncs.com/hughcube/php-demo:base-latest
    image: registry.cn-hangzhou.aliyuncs.com/hughcube/php-demo:base-latest-developer
    ports:
      - "5001:80"
    user: www-data:www-data
    environment:
        HUGHCUBE_ALIFC_ALLOW_FIRE_JOB: On
        COMPOSER_PROXY: ${COMPOSER_PROXY}
    command: /usr/local/bin/php /data/app/artisan serve --host=0.0.0.0 --port=80
    #command: /usr/local/bin/php /data/app/artisan octane:start --host=0.0.0.0 --port=80 --max-requests=100 --workers=1
    volumes:
      - .:/data/app:rw
      - home-volume:/root/:rw
    restart: always
    networks:
      - app

volumes:
  home-volume: {}
