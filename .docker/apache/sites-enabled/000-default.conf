
Listen 9000
ServerName example.com

StartServers 1
MinSpareServers 1
MaxSpareServers 4
MaxRequestWorkers 250
MaxConnectionsPerChild 10000

ServerTokens Prod
ServerSignature Off

ExtendedStatus off

BufferedLogs On

LogLevel warn
#ErrorLog "/var/log/apache2/error.log"
#ErrorLog "/data/app/storage/logs/apache-error.log"
ErrorLog "|/usr/bin/rotatelogs -f -l -c /data/app/storage/logs/apache-error-%Y-%m-%d.log 86400"

#LogFormat "%h %l %u %t %{Host}i \"%r\" %>s %Dμs %O \"%{Referer}i\" \"%{User-Agent}i\"" combined
LogFormat "%h %l %u %t \"%r\" %>s %Dμs %O \"%{Referer}i\" \"%{User-Agent}i\"" combined
#CustomLog "/var/log/apache2/access.log" combined
#CustomLog "/data/app/storage/logs/apache-access.log" combined
CustomLog "|/usr/bin/rotatelogs -f -l -c /data/app/storage/logs/apache-access-%Y-%m-%d.log 86400" combined

<VirtualHost _default_:9000>
    #Protocols h2 http/1.1

    DocumentRoot ${APP_WEB_DIR}

    <Directory ${APP_WEB_DIR}>

        EnableMMAP On

        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted

        <IfModule mod_rewrite.c>
            <IfModule mod_negotiation.c>
                Options -MultiViews -Indexes
            </IfModule>

            RewriteEngine On

            # Handle Authorization Header
            RewriteCond %{HTTP:Authorization} .
            RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

            # Redirect Trailing Slashes If Not A Folder...
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} (.+)/$
            RewriteRule ^ %1 [L,R=301]

            # Send Requests To Front Controller...
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^ index.php [L]
        </IfModule>
    </Directory>

</VirtualHost>
